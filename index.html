<head>

        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f !important; font-family: 'Nunito', sans-serif; color: white; padding-bottom: env(safe-area-inset-bottom); }
        .page { display: none; min-height: 100vh; padding: 10px 16px; max-width: 430px; margin: 0 auto; }
        .page.active { display: block; }
        /* Paste ALL CSS from the st.markdown <style> in app.py here - it's long but complete */

        input { font-family: inherit; }

</head>
<body>
    <div class="app">
        <!-- Início page -->
        <section id="inicio" class="page active">
            <div style="text-align:center;padding:20px">
                <div style="width:110px;height:110px;background:linear-gradient(135deg,#1565C0,#42A5F5);border-radius:32px;display:flex;align-items:center;justify-content:center;font-size:55px;margin:0 auto 20px;box-shadow:0 10px 40px rgba(66,165,245,.4)">✚</div>
                <div style="font-size:11px;color:#42A5F5;font-weight:700;letter-spacing:4px;margin-bottom:10px">CID FARMACY</div>
                <div style="font-size:26px;font-weight:800;line-height:1.2">Bem-Vindo à sua<br>farmácia Digital</div>
                <div style="font-size:12px;color:#444;margin-top:8px">SEU BEM-ESTAR AGORA</div>
                <div style="font-size:70px;margin-top:20px">💊</div>
            </div>
            <button onclick="goPage('home')" class="btn-b full-btn">🚀 Começar</button>
            <button onclick="goPage('home')" class="btn-o full-btn">Pular</button>
        </section>

        <!-- Home page -->
        <section id="home" class="page">
            <header class="app-header">
                <div class="logo-area">
                    <div class="logo-icon">✚</div>
                    <span class="logo-name">CID FARMACY</span>
                </div>
                <button onclick="goPage('carrinho')" id="cart-btn" class="cart-badge-wrap">
                    🛒<span id="cart-count" class="cart-count">0</span>
                </button>
            </header>
            <input type="text" id="pesquisa" placeholder="🔍 Pesquisar medicamento...">
            <!-- Dynamic categories -->
        </section>

        <!-- Outras pages similar -->
    </div>

    <script>
        // Data from PRODUTOS
        const PRODUTOS = { /* Copy from app.py PRODUTOS dict as JS object */ /* full data */ };

        // State
        let state = {
            page: 'inicio',
            carrinho: JSON.parse(localStorage.getItem('carrinho') || '[]'),
            entrega: null
        };

        // Functions
        function goPage(p) {
            state.page = p;
            updateUI();
            localStorage.setItem('state', JSON.stringify(state));
        }

        function updateCartCount() {
            const count = state.carrinho.reduce((sum, i) => sum + i.qty, 0);
            document.getElementById('cart-count').textContent = count;
        }

        // Init
        window.onload = () => {
            const saved = localStorage.getItem('state');
            if (saved) state = JSON.parse(saved);
            updateUI();
        };

        function updateUI() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(state.page).classList.add('active');
            updateCartCount();
            // Load page content dynamic
        }

        // More functions for cart, etc.
    </script>
</body>
